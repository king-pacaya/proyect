<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="shortcut icon" href="multimedia/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <title>Versículos | Kraut</title>
    <style>
        :root {
            --green: #58CC02;
            --green-dark: #46A302;
            --blue: #1CB0F6;
            --blue-dark: #1899D6;
            --dark-blue: #203855;
            --red: #FF4B4B;
            --red-dark: #D33131;
            --gray-light: #E5E5E5;
            --orange: #FF9600;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #FFFFFF; 
            color: var(--dark-blue);
            overscroll-behavior-y: contain;
        }

        .btn-duo {
            position: relative;
            border: none;
            border-bottom: 4px solid var(--gray-light);
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-duo:active { margin-top: 4px; border-bottom: 0; }
        .btn-primary { background-color: var(--blue); color: white; border-color: var(--blue-dark); }
        .btn-success { background-color: var(--green); color: white; border-color: var(--green-dark); }
        .btn-error { background-color: var(--red); color: white; border-color: var(--red-dark); }
        .btn-ghost { background-color: white; color: #afafaf; border: 2px solid var(--gray-light); border-bottom-width: 4px; }

        .verse-card {
            border: 2px solid var(--gray-light);
            border-radius: 1.5rem;
            border-bottom-width: 6px;
        }

        .slide-up-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
        }
        .slide-up-screen.open { transform: translateY(0); }

        .practice-progress-bar { height: 16px; background: var(--gray-light); border-radius: 10px; width: 100%; }
        .practice-progress-fill { height: 100%; background: var(--green); transition: width 0.4s ease; border-radius: 10px; }

        .blank-input {
            border: 2px solid var(--gray-light);
            border-radius: 0.5rem;
            background-color: #F7F7F7;
            text-align: center;
            font-weight: 800;
            outline: none;
            margin: 2px;
            display: inline-block;
            font-size: 1rem;
        }
        .blank-input:focus { border-color: var(--blue); background-color: white; }
        .blank-input.correct { border-color: var(--green); background-color: #D7FFB8; color: var(--green-dark); }
        .blank-input.incorrect { border-color: var(--red); background-color: #FFDFE0; color: var(--red-dark); animation: shake 0.4s; }

        .check-footer { border-top: 2px solid var(--gray-light); padding: 1.5rem; background: white; }
        .check-footer.correct-bg { background-color: #D7FFB8; }
        .check-footer.incorrect-bg { background-color: #FFDFE0; }

        /* RSVP Pivot Highlight */
        .rsvp-pivot { color: var(--blue); }
        .mono { font-family: 'Roboto Mono', monospace; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .points-pop {
            animation: pop 0.3s ease;
        }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 300;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="antialiased select-none">

<div class="container max-w-2xl mx-auto p-6 sm:p-10 pb-32">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-black">Versículos</h2>
        <div class="flex items-center gap-2 bg-orange-100 px-4 py-2 rounded-2xl border-2 border-orange-200">
            <span class="iconify text-orange-500 text-2xl" data-icon="material-symbols:stars-rounded"></span>
            <span id="total-points-stat" class="font-black text-orange-600">0</span>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-2 sm:gap-4 mb-8 text-center">
        <div class="bg-blue-50 p-3 sm:p-4 rounded-2xl border-2 border-blue-100">
            <p class="text-2xl font-black text-[var(--blue)]" id="total-verses-stat">0</p>
            <p class="text-xs font-black text-blue-400 uppercase">Colección</p>
        </div>
        <div class="bg-green-50 p-3 sm:p-4 rounded-2xl border-2 border-green-100">
            <p class="text-2xl font-black text-[var(--green)]" id="dominated-verses-stat">0</p>
            <p class="text-xs font-black text-green-400 uppercase">Dominados</p>
        </div>
        <div class="bg-orange-50 p-3 sm:p-4 rounded-2xl border-2 border-orange-100">
            <p class="text-2xl font-black text-[var(--orange)]" id="streak-stat">0</p>
            <p class="text-xs font-black text-orange-400 uppercase">Racha</p>
        </div>
    </div>

    <div class="mb-10 relative">
        <span class="iconify absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-2xl" data-icon="material-symbols:search"></span>
        <input type="text" id="verse-search-input" placeholder="Buscar Versículo" 
               class="w-full p-4 pl-12 border-2 border-gray-200 rounded-2xl focus:border-[var(--blue)] outline-none font-bold">
    </div>

    <div id="saved-verses-list" class="space-y-6">
        </div>

    <div class="fixed bottom-6 left-0 right-0 px-6 z-50">
        <button id="open-modal-btn" class="btn-duo btn-primary w-full py-4 rounded-2xl shadow-xl text-lg">
            <span class="iconify mr-2 text-2xl" data-icon="material-symbols:add-rounded"></span>
            AGREGAR NUEVO
        </button>
    </div>
</div>

<div id="verse-modal-overlay" class="modal-overlay p-4">
    <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
        <div class="p-6">
            <h3 class="text-2xl font-black mb-6">Nuevo Versículo</h3>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="modal-verse-input" placeholder="Referencia (Ej: Juan 3:16)" 
                           class="flex-grow p-4 border-2 border-gray-100 rounded-2xl focus:border-[var(--blue)] outline-none font-bold text-lg">
                    <button id="search-verse-btn" class="btn-duo btn-primary p-4 rounded-2xl">
                        <span class="iconify text-2xl" data-icon="material-symbols:search"></span>
                    </button>
                </div>
                <div id="modal-verse-info" class="hidden animate-in fade-in">
                    <div id="modal-verse-text" class="p-4 bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl text-gray-600 font-bold italic"></div>
                </div>
                <p id="modal-status-message" class="text-sm font-bold text-center h-4"></p>
            </div>
        </div>
        <div class="p-6 bg-gray-50 flex gap-4">
            <button id="cancel-modal-btn" class="flex-1 btn-duo btn-ghost py-4 rounded-2xl">SALIR</button>
            <button id="save-modal-btn" class="flex-1 btn-duo btn-success py-4 rounded-2xl disabled:opacity-50" disabled>GUARDAR</button>
        </div>
    </div>
</div>

<div id="practice-screen" class="slide-up-screen">
    <header class="p-6 flex items-center gap-4 border-b">
        <button id="practice-close-btn" class="text-gray-400"><span class="iconify text-4xl" data-icon="carbon:close"></span></button>
        <div class="practice-progress-bar flex-grow">
            <div id="practice-progress-fill" class="practice-progress-fill" style="width: 0%;"></div>
        </div>
        <div id="practice-points-container" class="flex items-center gap-1 font-black text-orange-500 bg-orange-100 px-3 py-1 rounded-xl">
            <span class="iconify text-orange-500 text-xl" data-icon="material-symbols:stars-rounded"></span>
            <span id="practice-points" class="text-lg">0</span>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 sm:p-12 overflow-y-auto">
        <div class="w-full max-w-xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-gray-400" id="practice-mode-title">PRÁCTICA</h3>
                <button id="hint-peek-btn" class="btn-duo btn-ghost px-4 py-2 rounded-xl text-xs flex gap-1 items-center">
                    <span>REVISAR</span>
                    <span class="text-orange-500 text-lg">∞</span>
                </button>
            </div>
            
            <div id="practice-verse-container" class="text-xl sm:text-2xl font-bold leading-relaxed text-center mb-10"></div>
        </div>
    </main>

    <footer id="practice-footer" class="check-footer">
        <div class="max-w-xl mx-auto flex flex-col gap-4">
            <div id="feedback-message" class="hidden flex items-center gap-3 mb-4">
                <span id="feedback-icon" class="iconify text-5xl"></span>
                <div>
                    <p id="feedback-title" class="font-black text-xl"></p>
                    <p id="feedback-subtitle" class="text-sm font-bold"></p>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="surrender-btn" class="hidden flex-1 btn-duo btn-error py-4 rounded-2xl">RENDIRSE</button>
                <button id="practice-check-btn" class="flex-[2] btn-duo btn-success py-4 rounded-2xl text-lg">COMPROBAR</button>
            </div>
        </div>
    </footer>
</div>

<div id="rsvp-screen" class="slide-up-screen bg-gray-50">
    <header class="p-6 flex justify-between items-center">
        <span id="rsvp-wpm-display" class="font-black text-gray-400">300 WPM</span>
        <button id="rsvp-close-btn" class="text-gray-400"><span class="iconify text-4xl" data-icon="carbon:close-filled"></span></button>
    </header>
    <main class="flex-grow flex items-center justify-center">
        <div id="rsvp-word-display" class="mono text-5xl sm:text-7xl font-bold tracking-tight"></div>
    </main>
    <footer class="p-10 flex items-center justify-center gap-8">
        <button id="rsvp-prev-btn" class="btn-duo bg-white p-4 rounded-full border-gray-200"><span class="iconify text-3xl" data-icon="material-symbols:fast-rewind"></span></button>
        <button id="rsvp-main-btn" class="btn-duo btn-primary w-24 h-24 rounded-full">
            <span id="rsvp-play-icon" class="iconify text-5xl" data-icon="line-md:play-filled"></span>
            <span id="rsvp-pause-icon" class="iconify text-5xl hidden" data-icon="ic:outline-pause"></span>
        </button>
        <button id="rsvp-next-btn" class="btn-duo bg-white p-4 rounded-full border-gray-200"><span class="iconify text-3xl" data-icon="material-symbols:fast-forward"></span></button>
    </footer>
</div>

<script src="script.js?v=2.1"></script>
</body>
</html>
